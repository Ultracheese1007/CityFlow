name: CI Build & Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests & build
        run: mvn -B package

      # 只有 push 到 main 才推镜像；PR 只验证不推
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        if: github.event_name == 'push'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_LC:latest -t $IMAGE_LC:$SHA .
          docker push $IMAGE_LC:latest
          docker push $IMAGE_LC:$SHA
