server:
  port: ${APP_PORT:18080}

spring:
  application:
    name: cityflow

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:cityflow}?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&allowLoadLocalInfile=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:change_me}

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:change_me}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s


  jackson:
    default-property-inclusion: non_null

  jpa:
    hibernate:
      ddl-auto: none # 关闭 Hibernate DDL 建表，交给 Flyway
    open-in-view: false
    # 命名策略 —— 针对 Spring Boot 2.7 + Hibernate 5.x
    properties:
      # Spring 的物理命名策略：把 Java 的 camelCase -> 数据库 snake_case（小写加下划线）
      hibernate.physical_naming_strategy: org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
      # Spring 的隐式命名策略：没写 @Table/@Column 时的默认命名更符合 Spring 习惯
      hibernate.implicit_naming_strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
      # 时区（可选，推荐）：JDBC 层统一用 UTC，避免跨时区错位
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true

  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_64+_CHARS"
    access-ttl-minutes: 30
    refresh-ttl-days: 14
    refresh-cookie-name: "REFRESH_TOKEN"
    cookie-domain: ""        # 本地留空；生产填你的域名
    cookie-secure: false     # 本地 false；生产 true
    cookie-same-site: "Lax"

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                    # 等所有 in-sync replica 确认；demo 1 节点也无所谓，习惯成自然
    consumer:
      group-id: cityflow-app
      auto-offset-reset: earliest  # 第一次启动从最早消息读，不漏掉
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # JsonDeserializer 安全配置：信任反序列化的包
        spring.json.trusted.packages: 'com.cityflow.kafka,java.util,java.lang'

logging:
  level:
    com.cityflow: debug
  pattern:
    dateformat: mm:ss.SSS
    # 自定义控制台输出格式：插入 [%X{traceId:-}]
    # %X{key:-default} = 从 MDC 取 key，没有则用 default（这里用空串）
    console: "%clr(%d{${LOGGING_PATTERN_DATEFORMAT:-yyyy-MM-dd HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%X{traceId:-}]){magenta} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"


