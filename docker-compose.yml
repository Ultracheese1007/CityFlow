version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: cityflow-mysql
    restart: unless-stopped
    # 关键：打开服务端 LOCAL INFILE，并允许任意目录
    command: --local-infile=1 --secure-file-priv=""
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cityflow}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cityflow
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_PASSWORD:-change_me} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cityflow-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change_me}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cityflow
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  cityflow-app:
    build: .
    image: cityflow:local
    container_name: cityflow-app
    restart: unless-stopped
    ports:
      - "8080:18080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # 用 application.yaml 里现成的占位符，URL 里就会自动带 allowLoadLocalInfile=true
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cityflow}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
      # Flyway V3 里 ${dataDir} 的值 —— 容器内路径
      SPRING_FLYWAY_PLACEHOLDERS_DATADIR: /app/data
    volumes:
      # TSV 数据要挂进 app 容器（LOAD DATA LOCAL INFILE 是客户端读的）
      - ./ops/flyway/data:/app/data:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cityflow

  nginx:
    image: nginx:1.25-alpine
    container_name: cityflow-nginx
    restart: unless-stopped
    depends_on:
      - cityflow-app
    ports:
      - "18081:80"
    volumes:
      - ./ops/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/conf/conf.d:/etc/nginx/conf.d:ro
      - ./ops/nginx/html:/usr/share/nginx/html:ro
    networks:
      - cityflow

volumes:
  mysql_data:
  redis_data:

networks:
  cityflow:
    driver: bridge